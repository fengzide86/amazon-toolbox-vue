# CI/CD 测试工作流
# 每次提交代码或创建 PR 时自动运行测试

name: Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 后端测试
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd backend
          pytest -v --tb=short
      
      - name: Run tests with coverage
        run: |
          cd backend
          pip install pytest-cov
          pytest --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  # 前端测试
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm install -D vitest @vitejs/plugin-vue jsdom
      
      - name: Run tests
        run: npm run test:run
      
      - name: Run tests with coverage
        run: npm install -D @vitest/coverage-v8 && npm run test:coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

  # E2E 冒烟测试（Playwright）
  e2e-test:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Start backend server
        run: |
          cd backend
          DEBUG=True python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 5
        env:
          DEBUG: "True"
          DB_TYPE: "sqlite"
      
      - name: Start frontend dev server
        run: |
          npm run dev &
          sleep 5
      
      - name: Run Playwright smoke tests
        run: npx playwright test
        env:
          FRONTEND_URL: "http://localhost:3000"
          BACKEND_URL: "http://localhost:8000"
          E2E_ADMIN_PASSWORD: "admin123"
      
      - name: Run visual regression tests
        run: npx playwright test tests/e2e/visual-regression.spec.js
        env:
          FRONTEND_URL: "http://localhost:3000"
          BACKEND_URL: "http://localhost:8000"
          E2E_ADMIN_PASSWORD: "admin123"
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # 测试报告汇总
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Backend tests: ${{ needs.backend-test.result }}"
          echo "Frontend tests: ${{ needs.frontend-test.result }}"
          echo "E2E tests: ${{ needs.e2e-test.result }}"
          
          if [ "${{ needs.backend-test.result }}" != "success" ] || [ "${{ needs.frontend-test.result }}" != "success" ] || [ "${{ needs.e2e-test.result }}" != "success" ]; then
            echo "❌ Some tests failed!"
            exit 1
          fi
          
          echo "✅ All tests passed!"
